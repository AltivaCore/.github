<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="330" rx="28" fill="#08111F"/>

  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9BE37D"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background grid -->
  <path d="M0 260 H1200" stroke="#132238" stroke-width="1"/>
  <path d="M0 210 H1200" stroke="#132238" stroke-width="1" opacity="0.6"/>
  <path d="M0 160 H1200" stroke="#132238" stroke-width="1" opacity="0.4"/>
  <path d="M170 0 V330" stroke="#132238" stroke-width="1" opacity="0.5"/>
  <path d="M500 0 V330" stroke="#132238" stroke-width="1" opacity="0.3"/>
  <path d="M840 0 V330" stroke="#132238" stroke-width="1" opacity="0.3"/>

  <!-- Soft glow -->
  <circle cx="950" cy="80" r="190" fill="url(#blueGlow)"/>
  <circle cx="90" cy="285" r="180" fill="#22C55E" opacity="0.08"/>

  <!-- Logo card -->
  <rect x="78" y="78" width="118" height="118" rx="28" fill="#0F1B2D" stroke="#1E2E46" stroke-width="2"/>

  <!-- Stylized A/Core mark -->
  <path d="M137 104 L174 172 H151 L137 146 L123 172 H100 L137 104Z" fill="#E5EDF7"/>
  <circle cx="137" cy="161" r="20" fill="#08111F" stroke="#9BE37D" stroke-width="8"/>
  <circle cx="137" cy="161" r="6" fill="#9BE37D"/>

  <!-- Circuit lines -->
  <path d="M94 154 H118" stroke="#0EA5E9" stroke-width="5" stroke-linecap="round"/>
  <path d="M156 154 H182" stroke="#0EA5E9" stroke-width="5" stroke-linecap="round"/>
  <circle cx="92" cy="154" r="6" fill="#08111F" stroke="#0EA5E9" stroke-width="4"/>
  <circle cx="184" cy="154" r="6" fill="#08111F" stroke="#0EA5E9" stroke-width="4"/>

  <path d="M94 176 H119" stroke="#9BE37D" stroke-width="5" stroke-linecap="round"/>
  <path d="M155 176 H182" stroke="#9BE37D" stroke-width="5" stroke-linecap="round"/>
  <circle cx="92" cy="176" r="6" fill="#08111F" stroke="#9BE37D" stroke-width="4"/>
  <circle cx="184" cy="176" r="6" fill="#08111F" stroke="#9BE37D" stroke-width="4"/>

  <!-- Text -->
  <text x="230" y="133" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">
    Altiva<tspan fill="url(#greenGradient)">Core</tspan>
  </text>

  <text x="234" y="178" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">
    Tecnología aplicada a procesos reales.
  </text>

  <text x="234" y="218" fill="#9FB2C8" font-family="Segoe UI, Arial, sans-serif" font-size="19">
    Automatización · Sistemas empresariales · Datos · Productos web
  </text>

  <!-- Pills -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="234" y="250" width="104" height="34" rx="17" fill="#132238"/>
    <text x="260" y="272" fill="#D8E3F0">Sistemas</text>

    <rect x="352" y="250" width="142" height="34" rx="17" fill="#132238"/>
    <text x="376" y="272" fill="#D8E3F0">Automatización</text>

    <rect x="508" y="250" width="88" height="34" rx="17" fill="#132238"/>
    <text x="537" y="272" fill="#D8E3F0">Datos</text>

    <rect x="610" y="250" width="118" height="34" rx="17" fill="#132238"/>
    <text x="636" y="272" fill="#D8E3F0">MiCajaPOS</text>
  </g>
</svg>
