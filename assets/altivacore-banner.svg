<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" rx="26" fill="#08111F"/>

  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9BE37D"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Fondo sobrio -->
  <rect x="32" y="32" width="1136" height="236" rx="22" fill="#0B1424" stroke="#1E293B" stroke-width="1.5"/>

